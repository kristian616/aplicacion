<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - UNEFA Banda de Guerra</title>
    <style>
        :root {
            --primary: #002d72;
            --accent: #d4af37;
            --bg: #f4f7f6;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            text-align: center;
        }

        .login-container h2 {
            color: var(--primary);
            margin-bottom: 5px;
            font-size: 1.8rem;
            font-weight: 700;
        }

        .login-container h3 {
            color: var(--accent);
            margin-top: 0;
            margin-bottom: 30px;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 45, 114, 0.1);
            outline: none;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }

        .btn-login:hover {
            background-color: #001f52;
        }

        .footer-text {
            margin-top: 30px;
            font-size: 0.75rem;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>UNEFA</h2>
        <h3>Banda de Guerra - Núcleo Falcón</h3>
        
        <!-- Formulario configurado exactamente para la ruta POST de tu server.js -->
        <form action="/login" method="POST">
            <div class="form-group">
                <label for="username">Usuario Administrativo</label>
                <input type="text" id="username" name="username" placeholder="Ej: admin" required autocomplete="username">
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña de Acceso</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            
            <button type="submit" class="btn-login">Entrar al Sistema</button>
        </form>
        
        <p class="footer-text">Sistema de Gestión e Instrucción Musical © 2026</p>
    </div>

</body>
</html>
