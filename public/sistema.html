<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repositorio Musical - UNEFA Coro</title>
    <style>
        :root { --primary: #002d72; --accent: #d4af37; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; background: var(--bg); }
        
        /* Sidebar */
        nav { width: 260px; background: var(--primary); color: white; height: 100vh; padding: 20px; box-shadow: 2px 0 5px rgba(0,0,0,0.1); }
        nav h2 { font-size: 1.2rem; border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
        nav ul { list-style: none; padding: 0; margin-top: 30px; }
        nav ul li { padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        nav ul li a { color: white; text-decoration: none; font-weight: 500; }

        /* Main Content */
        main { flex: 1; padding: 40px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        /* Tabla de Repositorio */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #f8f9fa; padding: 12px; text-align: left; color: var(--primary); }
        td { padding: 12px; border-bottom: 1px solid #eee; vertical-align: middle; }
        
        .btn-play { background: var(--primary); color: white; padding: 8px 15px; border-radius: 5px; text-decoration: none; font-size: 0.9rem; border: none; cursor: pointer; display: inline-block; }
        .btn-admin { background: var(--accent); color: var(--primary); font-weight: bold; }
        
        /* Botón de Eliminar */
        .btn-delete { background: #dc3545; color: white; padding: 8px 12px; border-radius: 5px; border: none; cursor: pointer; font-size: 0.9rem; margin-left: 8px; transition: background 0.2s; }
        .btn-delete:hover { background: #bd2130; }
    </style>
</head>
<body>

    <nav>
        <h2>UNEFA - Banda de Guerra</h2>
        <ul>
            <li><a href="/index.html">Panel Principal</a></li>
            <li><a href="/repositorio.html">Repositorio de Toques</a></li>
            <li><a href="/manuales.html">Manuales Pedagógicos</a></li>
            <li><a href="/perfil.html">Mi Perfil</a></li>
            <li><a href="/login.html" style="color: #ffcccc;">Cerrar Sesión</a></li>
        </ul>
    </nav>

    <main>
        <header>
            <h1>Bienvenido al Repositorio Digital</h1>
            <div id="date">Coro, Julio 2026</div>
        </header>

        <!-- Formulario Oculto de Registro -->
        <div id="panel-registro" class="card" style="display: none; margin-bottom: 25px; border: 2px solid var(--accent);">
            <h3>➕ Registrar Nueva Partitura</h3>
            <form id="formToque" style="margin-top: 15px;">
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 500;">Nombre del Toque:</label>
                    <input type="text" id="nombreToque" placeholder="Ej: Marcha de Retreta" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;" required>
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 500;">Familia:</label>
                    <select id="familiaToque" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;" required>
                        <option value="Percusión">Percusión</option>
                        <option value="Vientos">Vientos</option>
                        <option value="Ceremonial">Ceremonial</option>
                    </select>
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 500;">Seleccionar Partitura en PDF:</label>
                    <input type="file" id="archivoPdf" accept=".pdf,application/pdf" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; background: white;" required>
                </div>
                <button type="submit" class="btn-play">Guardar y Añadir a la Tabla</button>
                <button type="button" onclick="cerrarFormulario()" style="background: #ccc; color: #333; padding: 8px 15px; border-radius: 5px; border: none; cursor: pointer; margin-left: 10px;">Cancelar</button>
            </form>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3>Toques Militares Recientes</h3>
                <button onclick="verificarPassword()" class="btn-play btn-admin">🔒 Añadir Partitura</button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Nombre del Toque</th>
                        <th>Familia</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-body">
                    <!-- Las filas se cargan dinámicamente desde el servidor Node.js -->
                </tbody>
            </table>
        </div>
    </main>

    <script>
        // Usamos ruta relativa para que funcione tanto en tu PC como en Render
        const API_URL = '/api/partituras'; 
        const PASSWORD_ADMIN = "admin123";

        // 1. Mostrar / Ocultar Formulario
        function verificarPassword() {
            const claveIngresada = prompt("Ingrese la contraseña de Administrador para agregar:");
            if (claveIngresada === null) return;

            if (claveIngresada === PASSWORD_ADMIN) {
                document.getElementById('panel-registro').style.display = 'block';
                document.getElementById('panel-registro').scrollIntoView({ behavior: 'smooth' });
            } else {
                alert("Contraseña incorrecta. Permiso denegado.");
            }
        }

        function cerrarFormulario() {
            document.getElementById('panel-registro').style.display = 'none';
        }

        // 2. Cargar partituras desde el servidor Node.js
        async function cargarPartituras() {
            try {
                const res = await fetch(API_URL);
                const lista = await res.json();

                const tbody = document.getElementById('tabla-body');
                tbody.innerHTML = "";

                lista.forEach(item => {
                    const fila = document.createElement('tr');
                    fila.innerHTML = `
                        <td>${item.nombre}</td>
                        <td>${item.familia}</td>
                        <td>${item.estado}</td>
                        <td style="display: flex; align-items: center;">
                            <a href="${item.url}" target="_blank" class="btn-play">Partitura</a>
                            <button onclick="eliminarPartitura(${item.id}, '${item.nombre}')" class="btn-delete" title="Eliminar partitura">🗑️ Eliminar</button>
                        </td>
                    `;
                    tbody.appendChild(fila);
                });
            } catch (error) {
                console.error("Error al cargar partituras:", error);
            }
        }

        // 3. Subir archivo al servidor usando FormData
        document.getElementById('formToque').addEventListener('submit', async function(e) {
            e.preventDefault();

            const formData = new FormData();
            formData.append('nombre', document.getElementById('nombreToque').value);
            formData.append('familia', document.getElementById('familiaToque').value);
            formData.append('archivoPdf', document.getElementById('archivoPdf').files[0]);

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: formData
                });

                if (res.ok) {
                    alert('¡Partitura subida y compartida con éxito!');
                    this.reset();
                    cerrarFormulario();
                    cargarPartituras();
                } else {
                    alert('Error al subir el archivo al servidor.');
                }
            } catch (error) {
                console.error('Error enviando formulario:', error);
            }
        });

        // 4. Eliminar partitura del servidor
        async function eliminarPartitura(id, nombre) {
            const claveIngresada = prompt(`Para eliminar "${nombre}", ingrese la contraseña de Administrador:`);
            if (!claveIngresada) return;

            try {
                const res = await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE',
                    headers: { 'x-admin-password': claveIngresada }
                });

                if (res.ok) {
                    alert(`La partitura "${nombre}" ha sido eliminada correctamente.`);
                    cargarPartituras();
                } else {
                    alert("Contraseña incorrecta o error al eliminar.");
                }
            } catch (error) {
                console.error("Error al eliminar:", error);
            }
        }

        // Cargar partituras al abrir la página
        cargarPartituras();
    </script>
</body>
</html>
